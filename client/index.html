<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />

    <!-- =====================================================
         ▼ 배포 도메인 확정 후 아래 naodisalm.kr 을 실제 도메인으로 교체하세요
            예) https://naeodisal.com
         ===================================================== -->

    <!-- 기본 SEO -->
    <title>나어디삶 · 직장인을 위한 AI 주거 추천</title>
    <meta name="description" content="직장과 가까운 동네, 예산에 맞는 매물, 안전한 생활권 — 나어디삶이 AI로 찾아드립니다." />
    <meta name="keywords" content="주거 추천, 직장 근처 아파트, 청년 주거, 통근 시간, 부동산, 서울 아파트" />
    <meta name="author" content="나어디삶" />

    <!-- Open Graph (카카오톡·페이스북·슬랙 등 링크 미리보기) -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="나어디삶" />
    <meta property="og:title"       content="나어디삶 — AI 주거 추천 서비스" />
    <meta property="og:description" content="직장 입력 하나로 통근·예산·안전·생활 4축을 분석해 최적 동네와 매물을 추천합니다. 국토부·부동산원·LH·통계청 공공데이터 융합." />
    <meta property="og:url"         content="https://naodisalm.kr" />
    <meta property="og:image"       content="https://naodisalm.kr/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="나어디삶 — AI 주거 추천 서비스 미리보기" />
    <meta property="og:locale"      content="ko_KR" />

    <!-- Twitter Card (트위터·X 공유) -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="나어디삶 — AI 주거 추천 서비스" />
    <meta name="twitter:description" content="직장 입력 하나로 최적 동네·매물 추천. 공공데이터 4기관 융합." />
    <meta name="twitter:image"       content="https://naodisalm.kr/og-image.png" />

    <!-- 카카오톡은 og: 태그를 그대로 사용합니다 (별도 태그 불필요) -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
